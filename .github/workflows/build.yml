name: Orinoco_Final_Real
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Descargar Motor
        run: |
          curl -L -o Orinoco_V5.apk https://github.com/videolan/vlc-android/releases/download/3.5.4/VLC-Android-3.5.4-arm64-v8a.apk
      - name: Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: ORINOCO_V5_INSTALABLE
          path: Orinoco_V5.apk
          
