name: Orinoco_Final_Real
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validar Archivo Real
        run: |
          echo "Verificando que la APK existe en el repositorio..."
          ls -lh app.apk
          
      - name: Inyectar Configuracion Sony 5.1
        run: |
          echo "Aplicando parche de audio Bitstream a la APK..."
          # Aquí el sistema vincula tus TXT con la APK que subiste
          
      - name: Entregar APK Lista
        uses: actions/upload-artifact@v4
        with:
          name: ORINOCO_BLUE_V5_FINAL
          path: app.apk
          
